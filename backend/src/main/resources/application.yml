spring:
  application:
    name: cv-mobile-backend

  profiles:
    active: ${SPRING_PROFILES_ACTIVE:dev}

  datasource:
    url: ${DB_URL:jdbc:postgresql://localhost:5432/cvmobile}
    username: ${DB_USERNAME:postgres}
    password: ${DB_PASSWORD}
    driver-class-name: org.postgresql.Driver

  jpa:
    hibernate:
      ddl-auto: validate
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect

  flyway:
    enabled: true
    locations: classpath:db/migration
    baseline-on-migrate: true

  servlet:
    multipart:
      enabled: true
      max-file-size: 5MB
      max-request-size: 6MB

server:
  port: ${SERVER_PORT:8082}

# Upload
upload:
  dir: ${UPLOAD_DIR:${user.home}/cv-uploads/photos}

# CORS — valeur sans default en base, chaque profil fixe la sienne
cors:
  allowed-origins: ${ALLOWED_ORIGINS}

# JWT — secret sans default en base (chaque profil le gere)
jwt:
  secret: ${JWT_SECRET}
  expiration: ${JWT_EXPIRATION:86400000}
  refresh-expiration: ${JWT_REFRESH_EXPIRATION:604800000}

# AI Configuration (DeepSeek — compatible OpenAI)
ai:
  deepseek:
    api-key: ${DEEPSEEK_API_KEY:}
    model: ${AI_MODEL:deepseek-chat}
    base-url: ${DEEPSEEK_BASE_URL:https://api.deepseek.com/v1}

# Actuator / Monitoring
management:
  endpoints:
    web:
      exposure:
        include: health,info
  endpoint:
    health:
      probes:
        enabled: true
      group:
        readiness:
          include: readinessState,db,deepseek

info:
  app:
    name: MonCV Backend
    version: 1.0.0
    description: API de creation de CV professionnels

# Swagger Configuration
springdoc:
  api-docs:
    path: /api-docs
  swagger-ui:
    path: /swagger-ui.html
    operationsSorter: method
