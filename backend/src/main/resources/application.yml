spring:
  application:
    name: cv-mobile-backend

  datasource:
    url: ${DB_URL:jdbc:postgresql://localhost:5432/cvmobile}
    username: ${DB_USERNAME:postgres}
    password: ${DB_PASSWORD:seven}
    driver-class-name: org.postgresql.Driver

  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: ${SHOW_SQL:false}
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
        format_sql: false

  flyway:
    enabled: true
    locations: classpath:db/migration
    baseline-on-migrate: true

  servlet:
    multipart:
      enabled: true
      max-file-size: 5MB
      max-request-size: 6MB

server:
  port: ${SERVER_PORT:8082}

# Upload
upload:
  dir: ${UPLOAD_DIR:${user.home}/cv-uploads/photos}

# CORS
cors:
  allowed-origins: ${ALLOWED_ORIGINS:http://localhost:3000,http://localhost:3001,http://localhost:8082,http://10.0.2.2:8082}

# JWT Configuration
jwt:
  secret: ${JWT_SECRET:cvMobileDevSecretKey2024AtLeast32CharsLong!}
  expiration: ${JWT_EXPIRATION:86400000}
  refresh-expiration: ${JWT_REFRESH_EXPIRATION:604800000}

# AI Configuration (DeepSeek — compatible OpenAI)
ai:
  deepseek:
    api-key: ${DEEPSEEK_API_KEY:}
    model: ${AI_MODEL:deepseek-chat}
    base-url: https://api.deepseek.com/v1
  fallback:
    enabled: ${AI_FALLBACK_ENABLED:true}

# Actuator / Monitoring
management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics,prometheus,circuitbreakers,retries
  endpoint:
    health:
      show-details: when-authorized
      probes:
        enabled: true
      group:
        readiness:
          include: readinessState,db

# Resilience4j : retry + circuit breaker + timeout pour les appels IA
resilience4j:
  retry:
    instances:
      ai-deepseek:
        max-attempts: 3                  # 1 initial + 2 retries
        wait-duration: 500ms
        enable-exponential-backoff: true
        exponential-backoff-multiplier: 2
        enable-randomized-wait: true
        randomized-wait-factor: 0.3
        retry-exceptions:
          - com.cvmobile.exception.ai.AiProviderDownException
        ignore-exceptions:
          - com.cvmobile.exception.ai.AiKeyInvalidException
          - com.cvmobile.exception.ai.AiQuotaExceededException
          - com.cvmobile.exception.ai.AiParseException
  circuitbreaker:
    instances:
      ai-deepseek:
        sliding-window-type: COUNT_BASED
        sliding-window-size: 10
        minimum-number-of-calls: 5
        failure-rate-threshold: 50
        wait-duration-in-open-state: 30s
        permitted-number-of-calls-in-half-open-state: 2
        automatic-transition-from-open-to-half-open-enabled: true
        record-exceptions:
          - com.cvmobile.exception.ai.AiProviderDownException
        ignore-exceptions:
          - com.cvmobile.exception.ai.AiKeyInvalidException
          - com.cvmobile.exception.ai.AiQuotaExceededException
  timelimiter:
    instances:
      ai-deepseek:
        timeout-duration: 10s
        cancel-running-future: true

info:
  app:
    name: MonCV Backend
    version: 1.0.0
    description: API de creation de CV professionnels

# Swagger Configuration
springdoc:
  api-docs:
    path: /api-docs
  swagger-ui:
    path: /swagger-ui.html
    operationsSorter: method
