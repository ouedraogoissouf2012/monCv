spring:
  datasource:
    url: jdbc:h2:mem:testdb;DB_CLOSE_DELAY=-1;MODE=PostgreSQL
    username: sa
    password:
    driver-class-name: org.h2.Driver

  jpa:
    hibernate:
      ddl-auto: create-drop
    show-sql: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.H2Dialect

  flyway:
    enabled: false

jwt:
  secret: TestSecretKeyForUnitTestsOnly1234567890ABCDEFGHIJ
  expiration: 3600000
  refresh-expiration: 86400000

cors:
  allowed-origins: http://localhost:3000

upload:
  dir: ${java.io.tmpdir}/cv-test-uploads

ai:
  deepseek:
    api-key:
    model: deepseek-chat
    base-url: https://api.deepseek.com/v1

# Override: pas de groupe readiness avec deepseek en test (le bean est @Profile("!test"))
management:
  endpoint:
    health:
      group:
        readiness:
          include: readinessState,db
