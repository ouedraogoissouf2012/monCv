name: CI — Build & Test

on:
  push:
    branches: [main, develop, 'feature/**']
  pull_request:
    branches: [main, develop]

jobs:
  # ── Backend (Spring Boot) ──────────────────────────────────
  backend:
    name: Backend — Build & Test
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:17
        env:
          POSTGRES_DB: cvmobile_test
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: test
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - uses: actions/checkout@v4

      - name: Setup Java 21
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 21
          cache: maven

      - name: Build & Test
        working-directory: backend
        env:
          DB_URL: jdbc:postgresql://localhost:5432/cvmobile_test
          DB_USERNAME: postgres
          DB_PASSWORD: test
          JWT_SECRET: ci-test-secret-key-minimum-32-characters-long!!
          DEEPSEEK_API_KEY: ""
        run: mvn clean verify -q

  # ── Frontend (Flutter) ─────────────────────────────────────
  frontend:
    name: Frontend — Analyze & Test
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.27.x'
          channel: stable
          cache: true

      - name: Install dependencies
        working-directory: mobile
        run: flutter pub get

      - name: Analyze
        working-directory: mobile
        run: flutter analyze --no-fatal-infos

      - name: Run tests
        working-directory: mobile
        run: flutter test --no-pub

  # ── Build APK (sur tags release) ───────────────────────────
  build-apk:
    name: Build APK
    runs-on: ubuntu-latest
    needs: [backend, frontend]
    if: startsWith(github.ref, 'refs/tags/v')

    steps:
      - uses: actions/checkout@v4

      - name: Setup Java 21
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 21

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.27.x'
          channel: stable

      - name: Build APK
        working-directory: mobile
        run: |
          flutter pub get
          flutter build apk --release --no-tree-shake-icons

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: app-release
          path: mobile/build/app/outputs/flutter-apk/app-release.apk
